name: Android CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Ensure no INTERNET permission
        run: |
          if grep -q "android.permission.INTERNET" app/src/main/AndroidManifest.xml; then
            echo "INTERNET permission is not allowed for offline app." >&2
            exit 1
          fi

      - name: Build + Lint + Unit tests
        run: ./gradlew --no-daemon assembleDebug lintDebug testDebugUnitTest
